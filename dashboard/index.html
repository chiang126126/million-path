<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Million Path · MP500 周复盘看板</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3;
    --muted:#8b949e; --accent:#1f6feb; --green:#3fb950; --red:#f85149;
    --amber:#d29922; --chip:#21262d;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"微软雅黑",Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;padding:24px;max-width:1080px;margin:0 auto}
  h1{font-size:22px;margin:0 0 2px} h2{font-size:16px;margin:24px 0 10px;color:var(--text)}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .card{background:var(--chip);border:1px solid var(--border);border-radius:8px;padding:12px}
  .card .k{font-size:12px;color:var(--muted)} .card .v{font-size:20px;font-weight:600;margin-top:4px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
  th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}
  th{color:var(--muted);font-weight:500;position:sticky;top:0;background:var(--panel)}
  .tablewrap{overflow-x:auto}
  .chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .risk-on{background:rgba(63,185,80,.15);color:var(--green)}
  .neutral{background:rgba(210,153,34,.15);color:var(--amber)}
  .risk-off{background:rgba(248,81,73,.15);color:var(--red)}
  .pos{color:var(--green)} .neg{color:var(--red)} .warn{color:var(--red);font-weight:700}
  .calc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  input,select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:8px;font-size:14px}
  .result{background:var(--chip);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:14px}
  .result b{color:var(--accent)}
  .scen td:first-child{font-weight:600}
  svg{width:100%;height:180px;display:block}
  .foot{color:var(--muted);font-size:12px;margin-top:20px;border-top:1px solid var(--border);padding-top:12px}
  .badge{font-size:11px;color:var(--muted)}
  code{background:var(--chip);padding:1px 5px;border-radius:4px;font-size:12px}
</style>
</head>
<body>
  <h1>Million Path · MP500 周复盘看板</h1>
  <div class="sub" id="metaLine">加载中…</div>

  <div class="panel">
    <h2 style="margin-top:0">📊 概览</h2>
    <div class="cards" id="cards"></div>
  </div>

  <div class="panel">
    <h2 style="margin-top:0">📈 权益曲线</h2>
    <div id="chart"></div>
  </div>

  <div class="panel">
    <h2 style="margin-top:0">🗓️ 周 KPI 明细</h2>
    <div class="tablewrap">
      <table id="kpi">
        <thead><tr>
          <th>周</th><th>日期</th><th>阶段</th><th>行情</th>
          <th>周收益</th><th>目标</th><th>笔数</th><th>胜率</th>
          <th>盈亏比</th><th>回撤</th><th>费用%</th><th>违规</th>
        </tr></thead>
        <tbody id="kpiBody"></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <h2 style="margin-top:0">🧮 复利测算器</h2>
    <div class="calc-grid">
      <div><label>起始资金 (USDT)</label><input id="cStart" type="number" value="500"></div>
      <div><label>周收益率 (%)</label><input id="cRate" type="number" value="2.5" step="0.1"></div>
      <div><label>USDT/CNY 汇率</label><input id="cFx" type="number" value="6.74" step="0.01"></div>
      <div><label>目标人民币</label><input id="cRmb" type="number" value="1000000"></div>
      <div><label>目标美元</label><input id="cUsd" type="number" value="1000000"></div>
    </div>
    <div class="result" id="calcOut"></div>
    <h2>不同周收益率对比</h2>
    <div class="tablewrap">
      <table class="scen">
        <thead><tr><th>周化</th><th>年化(复利)</th><th>→ 目标人民币</th><th>→ 目标美元</th></tr></thead>
        <tbody id="scenBody"></tbody>
      </table>
    </div>
  </div>

  <div class="foot">
    数据源：<code>./data/ledger.json</code>（缺省时使用内置示例）。每周运行
    <code>python scripts/new_week.py</code> 自动结转生成新一周。<br>
    ⚠️ 本看板为纪律与复盘工具，非收益承诺；加密交易可能损失全部本金，不构成投资建议。
  </div>

<script>
// ---------- 内置示例（fetch 失败时回退，保证本地双击可用） ----------
const SAMPLE = {
  meta:{strategy:"MP500 / Million Path",start_date:"2026-06-19",initial_capital:500,
    usdt_cny:6.74,target_rmb:1000000,target_usd:1000000},
  weeks:[
    {week:1,start_date:"2026-06-19",end_date:"2026-06-25",stage:"S0",regime:"neutral",
     equity_start:500,equity_end:500,target_return_pct:0,trades:0,win_rate_pct:null,
     profit_factor:null,max_drawdown_pct:0,fees_funding_pct:0,violations:0,notes:""},
    {week:2,start_date:"2026-06-26",end_date:"2026-07-02",stage:"S0",regime:"risk-on",
     equity_start:500,equity_end:500,target_return_pct:0,trades:6,win_rate_pct:50,
     profit_factor:1.4,max_drawdown_pct:0,fees_funding_pct:0,violations:0,notes:""},
    {week:3,start_date:"2026-07-03",end_date:"2026-07-09",stage:"S0",regime:"neutral",
     equity_start:500,equity_end:500,target_return_pct:0,trades:4,win_rate_pct:50,
     profit_factor:1.6,max_drawdown_pct:0,fees_funding_pct:0,violations:0,notes:""}
  ]
};

const fmt=(n,d=2)=>n==null||isNaN(n)?"—":Number(n).toLocaleString("en-US",{maximumFractionDigits:d});
const pct=(n)=>n==null?"—":(n>0?"+":"")+fmt(n,2)+"%";

function weeksTo(start,rate,target){
  if(rate<=0||target<=start) return target<=start?0:Infinity;
  return Math.log(target/start)/Math.log(1+rate);
}
function fmtDur(w){
  if(!isFinite(w)) return "—";
  const y=w/52; return `${Math.round(w)} 周 (${y.toFixed(1)} 年)`;
}

function renderCalc(){
  const start=+cStart.value, rate=(+cRate.value)/100, fx=+cFx.value;
  const rmb=+cRmb.value, usd=+cUsd.value;
  const tgtRmbU=rmb/fx, tgtUsdU=usd; // USDT≈USD
  const yr=(Math.pow(1+rate,52)-1)*100;
  calcOut.innerHTML=
    `周化 <b>${(rate*100).toFixed(1)}%</b> ≈ 年化(复利) <b>${fmt(yr,0)}%</b><br>`+
    `${fmt(rmb,0)} 人民币 ≈ <b>${fmt(tgtRmbU,0)} USDT</b> → 需 <b>${fmtDur(weeksTo(start,rate,tgtRmbU))}</b><br>`+
    `${fmt(usd,0)} 美元 ≈ <b>${fmt(tgtUsdU,0)} USDT</b> → 需 <b>${fmtDur(weeksTo(start,rate,tgtUsdU))}</b>`;
  const rows=[0.02,0.025,0.03,0.05,0.08,0.10].map(r=>{
    const y=(Math.pow(1+r,52)-1)*100;
    return `<tr><td>${(r*100).toFixed(1)}%</td><td>${fmt(y,0)}%</td>`+
      `<td>${fmtDur(weeksTo(start,r,tgtRmbU))}</td>`+
      `<td>${fmtDur(weeksTo(start,r,tgtUsdU))}</td></tr>`;
  }).join("");
  scenBody.innerHTML=rows;
}
[cStart,cRate,cFx,cRmb,cUsd].forEach(el=>el.addEventListener("input",renderCalc));

function renderData(data){
  const m=data.meta, w=data.weeks||[];
  metaLine.textContent=`${m.strategy} · 启动 ${m.start_date} · 初始 ${m.initial_capital} USDT · 共 ${w.length} 周`;
  // 衍生
  let peak=m.initial_capital, maxDD=0;
  w.forEach(x=>{x._ret=x.equity_start?((x.equity_end/x.equity_start)-1)*100:null;
    peak=Math.max(peak,x.equity_end); maxDD=Math.max(maxDD,(peak-x.equity_end)/peak*100);});
  const last=w[w.length-1]||{equity_end:m.initial_capital,stage:"S0"};
  const cum=((last.equity_end/m.initial_capital)-1)*100;
  const viol=w.reduce((s,x)=>s+(x.violations||0),0);
  const avg=w.filter(x=>x._ret!=null).reduce((s,x,_,a)=>s+x._ret/a.length,0);
  // cards
  cards.innerHTML=[
    ["当前权益",fmt(last.equity_end,0)+" U"],
    ["当前阶段",last.stage],
    ["累计收益",pct(cum)],
    ["平均周收益",pct(avg)],
    ["最大回撤",fmt(maxDD,1)+"%"],
    ["累计违规",`<span class="${viol>0?'warn':'pos'}">${viol}</span>`],
  ].map(([k,v])=>`<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");
  // table
  kpiBody.innerHTML=w.map(x=>{
    const rc=x._ret==null?"":(x._ret>=0?"pos":"neg");
    return `<tr>
      <td>${x.week}</td><td>${x.start_date}</td><td>${x.stage}</td>
      <td><span class="chip ${x.regime}">${x.regime}</span></td>
      <td class="${rc}">${pct(x._ret)}</td>
      <td>${x.target_return_pct!=null?x.target_return_pct+"%":"—"}</td>
      <td>${x.trades??"—"}</td><td>${x.win_rate_pct!=null?x.win_rate_pct+"%":"—"}</td>
      <td>${fmt(x.profit_factor)}</td><td>${x.max_drawdown_pct!=null?x.max_drawdown_pct+"%":"—"}</td>
      <td>${x.fees_funding_pct!=null?x.fees_funding_pct+"%":"—"}</td>
      <td class="${x.violations>0?'warn':''}">${x.violations??0}</td>
    </tr>`;
  }).join("");
  renderChart(w.map(x=>x.equity_end),m.initial_capital);
}

function renderChart(vals,base){
  if(!vals.length){chart.innerHTML="<div class='badge'>暂无数据</div>";return;}
  const data=[base,...vals], W=1000,H=180,pad=24;
  const min=Math.min(...data),max=Math.max(...data),rng=max-min||1;
  const x=i=>pad+i*(W-2*pad)/(data.length-1||1);
  const y=v=>H-pad-(v-min)/rng*(H-2*pad);
  const path=data.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ");
  const dots=data.map((v,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="3" fill="#1f6feb"/>`).join("");
  chart.innerHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${path}" fill="none" stroke="#1f6feb" stroke-width="2"/>${dots}
    <text x="${pad}" y="14" fill="#8b949e" font-size="12">max ${fmt(max,0)}U</text>
    <text x="${pad}" y="${H-6}" fill="#8b949e" font-size="12">min ${fmt(min,0)}U</text>
  </svg>`;
}

// ---------- 加载数据 ----------
fetch("./data/ledger.json",{cache:"no-store"})
  .then(r=>{if(!r.ok)throw 0;return r.json()})
  .then(renderData)
  .catch(()=>{renderData(SAMPLE);
    metaLine.innerHTML+=' <span class="badge">（示例数据：未找到 data/ledger.json）</span>';});

renderCalc();
</script>
</body>
</html>
